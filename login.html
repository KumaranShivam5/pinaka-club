<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/main.js">
    </script>
    <script>
        function setCookie(cookieName, cookieValue, expirationDays) {
            var d = new Date();
            d.setTime(d.getTime() + (expirationDays * 24 * 60 * 60 * 1000)); // Set expiration time in milliseconds
            var expires = "expires=" + d.toUTCString();
            document.cookie = cookieName + "=" + cookieValue + ";" + expires + ";path=/";
        }
        function getCookie(cookieName) {
            var name = cookieName + "=";
            var decodedCookie = decodeURIComponent(document.cookie);
            var cookieArray = decodedCookie.split(';');
            for (var i = 0; i < cookieArray.length; i++) {
                var cookie = cookieArray[i].trim();
                if (cookie.indexOf(name) == 0) {
                    return cookie.substring(name.length, cookie.length);
                }
            }
            return ""; // Cookie not found
        }

        var user_id = getCookie('user_id')
        if(user_id == ""){
            window.location.href = 'OTP.html'
        }

    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div id="statusModal" class="modal">
        <div class="modal-content">
            <div class="modal-content-centre">
                <span class="close">&times;</span>
            <p id="statusMessage">Submitting form...</p>
            <button id="retryButton" style="display: none;">Retry</button>
            </div>
        </div>
    </div>
    <div class="container">
        <div class="login-grid">
            <div class="logo">
                <img src="images/logo/large-logo-dark.svg" alt="Club Logo">
            </div>
            <div class="form-container">
                <h4>Member Login</h4>
                <!-- Modal -->


                <form id="studentForm">
                    <div class="input-field">
                        <input type="text" id="name" name="name" required>
                        <label for="name">Name</label>
                    </div>
                    <div class="input-field">
                        <input type="number" id="age" name="age" required>
                        <label for="age">Age</label>
                    </div>
                    
                    <div class="input-field">
                        <select id="interestedCategory" name="interestedCategory">
                            <option value="" disabled selected>Select Interested Category</option>
                            <option value="10mAirRifle">10m Air Rifle</option>
                            <option value="pistol">Pistol</option>
                        </select>
                        <label for="interestedCategory">Interested Category</label>
                    </div>
                    <div class="input-field">
                        <select id="interestedCourse" name="interestedCourse">
                            <option value="" disabled selected>Select the course</option>
                            <option value="Foundation">Foundation</option>
                            <option value="Bull's Eye">Bulls Eye</option>
                            <option value="Yoga and Maditation">Yoga and Maditation</option>
                        </select>
                        <label for="interestedCategory">Interested course</label>
                    </div>
                    <div class="input-field">
                        <input type="tel" id="contactNumber" name="contactNumber" pattern="[0-9]{10}" required>
                        <label for="contactNumber">Contact Number (10-digit)</label>
                    </div>
                    <div class="input-field">
                        <textarea id="address" class="materialize-textarea" name="address" required></textarea>
                        <label for="address">Address</label>
                    </div>
                    <div class="input-field-inline">
                        <p>
                            <label>
                                <input type="checkbox" id="isStudent" name="isStudent">
                                <span>Are you a student?</span>
                            </label>
                        </p>
                        <div class="input-field" id="schoolCollegeInput" style="display: none;">
                            <select id="schoolCollege" name="schoolCollege">
                                <option value="" disabled selected>Select School/College</option>
                                <option value="DAV Public School, Chatra">DAV Public School, Chatra</option>
                                <option value="Nazreth School, Chatra">Nazreth School, Chatra</option>
                                <option value="SS Girls High School, Chatra">SS Girls High School, Chatra</option>
                                <option value="SS Boys High School, Chatra">SS Boys High School, Chatra</option>
                                <option value="Chatra College Chatra">Chatra College Chatra</option>
                                <option value="other">Other</option>
                                <!-- <option value="other">Chatra COllege CHatrs</option> -->
                            </select>
                            <label for="schoolCollege">School/College</label>
                        </div>
                    </div>
                    <div class="input-field" id="otherSchoolInput" style="display: none;">
                        <input type="text" id="otherSchool" name="otherSchool">
                        <label for="otherSchool">Enter your School/College bane</label>
                    </div>
                    <button class="btn waves-effect waves-light" type="submit" onsubmit="">Submit</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Materialize components
            M.AutoInit();

            // Show/hide school/college input based on checkbox
            const isStudentCheckbox = document.getElementById('isStudent');
            const schoolCollegeInput = document.getElementById('schoolCollegeInput');
            const otherSchoolInput = document.getElementById('otherSchoolInput');

            isStudentCheckbox.addEventListener('change', function() {
                if (isStudentCheckbox.checked) {
                    schoolCollegeInput.style.display = 'block';
                } else {
                    schoolCollegeInput.style.display = 'none';
                    otherSchoolInput.style.display = 'none';
                }
            });

            // Show/hide other school input based on dropdown selection
            const schoolCollegeDropdown = document.getElementById('schoolCollege');
            schoolCollegeDropdown.addEventListener('change', function() {
                if (schoolCollegeDropdown.value === 'other') {
                    otherSchoolInput.style.display = 'block';
                } else {
                    otherSchoolInput.style.display = 'none';
                }
            });
        });
    </script>
    <script src="js/register-form.js"></script>
</body>
</html>
